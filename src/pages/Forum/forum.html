<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuildSpace | Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../components/navbar.css" />
  <link rel="stylesheet" href="../../styles/forum.css" />
</head>

<body class="bg-light">
  <div data-navbar data-active="forum" data-base="../" data-collapse-id="forumNavbar"></div>

  <main class="container py-4">
    <section class="card border-0 shadow-sm" aria-label="Forum discovery">
      <div class="card-body">
        <header class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-3">
          <div>
            <h1 class="h3 mb-1">Discover Discussions</h1>
            <p class="text-secondary mb-0">Explore trending student topics in a clean Bootstrap feed.</p>
          </div>
          <button type="button" class="btn btn-primary" id="createPostToggle" aria-expanded="false"
            aria-controls="createPostContent">
            Publish Post
          </button>
        </header>

        <div id="createPostContent" class="card border mb-3" hidden>
          <div class="card-body">
            <form id="createPostForm" class="row g-3" novalidate>
              <div class="col-md-6">
                <label class="form-label" for="authorInput">Your name</label>
                <input id="authorInput" name="author" class="form-control" type="text" maxlength="40" placeholder="e.g. Esther"
                  required />
              </div>

              <div class="col-md-6">
                <label class="form-label" for="categoryInput">Category</label>
                <select id="categoryInput" name="category" class="form-select" required>
                  <option value="">Select one</option>
                  <option value="Study">Study</option>
                  <option value="Events">Events</option>
                  <option value="Life">Life</option>
                  <option value="LostFound">Lost &amp; Found</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label" for="titleInput">Title</label>
                <input id="titleInput" name="title" class="form-control" type="text" maxlength="100"
                  placeholder="What do you want to ask?" required />
              </div>

              <div class="col-12">
                <label class="form-label" for="contentInput">Details</label>
                <textarea id="contentInput" name="content" class="form-control" rows="4" maxlength="500"
                  placeholder="Share context so classmates can help quickly." required></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Photo (optional)</label>
                <input id="imageFileInput" name="imageFile" class="d-none" type="file"
                  accept="image/png,image/jpeg,image/webp,image/gif,image/avif,image/bmp" />

                <div class="d-flex flex-wrap align-items-center gap-2">
                  <button type="button" class="btn btn-outline-primary" id="imagePickerBtn">Upload Photo</button>
                  <span id="imageFileName" class="small text-secondary">No photo selected</span>
                  <button type="button" class="btn btn-outline-secondary" id="clearImageBtn" hidden>Remove</button>
                </div>

                <div id="imagePreviewWrap" class="mt-2" hidden>
                  <img id="imagePreview" class="img-thumbnail image-preview" alt="Selected photo preview" />
                </div>
              </div>

              <div class="col-12 d-flex flex-wrap align-items-center gap-2">
                <button type="submit" class="btn btn-primary">Publish</button>
                <p id="createPostError" class="mb-0 small text-danger" role="alert" aria-live="polite"></p>
              </div>
            </form>
          </div>
        </div>

        <section aria-label="Search and filters" class="mb-3">
          <div class="d-flex flex-wrap gap-2 mb-2" id="sortChips" aria-label="Sort posts">
            <button type="button" class="btn btn-sm rounded-pill btn-primary active" data-sort="latest">Latest</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-sort="popular">Popular</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-sort="oldest">Oldest</button>
          </div>

          <div class="mb-2">
            <label class="visually-hidden" for="searchInput">Search posts</label>
            <input id="searchInput" class="form-control" type="search" placeholder="Search by title, author, category..." />
          </div>

          <div class="d-flex flex-wrap gap-2" id="categoryChips" aria-label="Filter by category">
            <button type="button" class="btn btn-sm rounded-pill btn-primary active" data-category="all">All</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-category="Study">Study</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-category="Events">Events</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-category="Life">Life</button>
            <button type="button" class="btn btn-sm rounded-pill btn-outline-secondary" data-category="LostFound">Lost &amp; Found</button>
          </div>

          <select id="sortSelect" class="d-none" aria-hidden="true" tabindex="-1">
            <option value="latest" selected>Latest</option>
            <option value="oldest">Oldest</option>
            <option value="popular">Most Popular</option>
          </select>

          <select id="categoryFilter" class="d-none" aria-hidden="true" tabindex="-1">
            <option value="all" selected>All</option>
            <option value="Study">Study</option>
            <option value="Events">Events</option>
            <option value="Life">Life</option>
            <option value="LostFound">Lost &amp; Found</option>
          </select>
        </section>

        <section aria-label="Forum posts">
          <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
            <h2 class="h4 mb-0">Community Feed</h2>
            <div class="text-secondary" id="forumStats" aria-live="polite"></div>
          </div>
          <div id="postsContainer" class="posts-masonry"></div>
        </section>
      </div>
    </section>
  </main>

  <footer class="border-top bg-white py-3">
    <div class="container text-center text-secondary small">&copy; 2026 UWA Community App</div>
  </footer>

  <script src="../../components/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./forum.js" defer></script>
</body>

</html>
