<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/style.css">
  <link rel="stylesheet" href="../../styles/global.css">

  <title>Login</title>
</head>

<body>
  <div class="custom-navbar text-white ps-5 py-3 page-header">
    <h4 class="m-0">GuildSpace</h4>
  </div>
  <div class="login-page">

    <h3 class="text-center mb-4">Welcome back</h3>

    <p id="message"></p>

    <form id="login">
      <div class="mb-3">
        <label for="email" class="form-label">Email ID:</label>
        <input type="email" id="email" placeholder="Enter your student email id" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" name="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="mt-2">Need a account? <a href="../Register/register.html">Register</a></p>

  </div>
  
</body>

</html>
