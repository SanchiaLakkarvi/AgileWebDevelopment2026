<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Login</title>
</head>

<body>
  <h1>Log into LostNFound</h1>
  <form id="login">
    <label for="email">Email ID:</label>
    <input type="email" id="email" placeholder="Enter your student email id" name="email"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter your password" name="password"><br><br>

    <button type="submit">Login</button>
  </form>

  <p id="message"></p>
  
</body>

</html>
