<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/style.css">
  <link rel="stylesheet" href="../../styles/global.css">
  <title>Register</title>
</head>

<body>
    <div class="custom-navbar text-white ps-5 py-3 page-header">
        <h4 class="m-0">GuildSpace</h4>
    </div>
    <div class="register-page">
        <h3 class="text-center mb-4">Register your account</h3>
        <p id="message"></p>
        <form id="register">
            <div class="mb-3 row">
                <label for="name" class="form-label">Full Name:</label>
                <div class="col">
                    <input type="text" id="first-name" placeholder="First name" name="firstName" class="form-control" required>
                </div>
                <div class="col">
                    <input type="text" id="last-name" placeholder="Last name" name="lastName" class="form-control" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email ID:</label>
            <input type="email" id="email" placeholder="Enter your student email id" name="email" class="form-control" required pattern=".+@student\.uwa\.edu\.au">
            </div>

            <div class="mb-3">
                <label for="dob" class="form-label">Date of Birth:</label>
                <input type="date" id="dob" name="dob" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="gender" class="form-label">Gender:</label>
                <select name="gender" class="form-control" required>
                    <option value="" disabled selected>Select your gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Others</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" placeholder="Create password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label"> Confirm Password:</label>
                <input type="password" id="confirm-password" placeholder="Re-enter password" name="confirm-password" class="form-control" required>
            </div>
        </form>

        <button type="submit" class="btn btn-primary w-100">Create account</button>
        <p class="mt-2"> Already Registered? <a href="../Login/login.html">Login Now</a></p>

    </div>

    <script>
        const form = document.getElementById("register")
        form.addEventListener("submit", function(confirmation){
            const password = document.getElementById("password").value;
            const confirm_password = document.getElementById("confirm-password").value;

            if (password !== confirm_password){
                confirmation.preventDefault();
                document.getElementById("message").textContent = "Passwords do not match!";
            }

        })
    </script>
</body>
