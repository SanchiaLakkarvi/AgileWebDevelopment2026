<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuildSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="{{ url_for('home') }}">GuildSpace</a>

        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('forum') }}">Forum</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('marketplace') }}">Marketplace</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('login') }}">Login</a></li>
                <li class="nav-item"><span class="profile-circle">S</span></li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-container">
    {% block content %}{% endblock %}
</main>

<footer class="footer-clean">
    <p>GuildSpace · UWA Student Platform</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
