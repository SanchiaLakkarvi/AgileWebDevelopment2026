{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
{% endblock %}

{% block content %}
<div data-navbar data-active="{{ active_nav }}"></div>

<div class="login-page ">
  <h3 class="text-center mb-4">Welcome back</h3>
  <p id="message"></p>

  <form id="login" method="POST" action="{{ url_for('login') }}">
    <div class="mb-3">
      <label for="email" class="form-label">Email ID:</label>
      <input type="email" id="email" placeholder="Enter your student email id" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" name="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <p class="mt-2">Need a account? <a href="{{ url_for('register') }}">Register</a></p>

</div>

{% endblock %}
