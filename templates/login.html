{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}" />
{% endblock %}

{% block body %}
<div data-navbar data-active="{{ active_nav }}"></div>

<div class="login-page">
  <h3 class="text-center mb-4">Welcome back</h3>
  <p id="message"></p>

  <form id="login" method="get" action="{{ url_for('marketplace.login') }}">
    <div class="mb-3">
      <label for="email" class="form-label">Email ID:</label>
      <input type="email" id="email" placeholder="Enter your student email id" name="email" class="form-control" required />
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password:</label>
      <input type="password" id="password" placeholder="Enter your password" name="password" class="form-control" required />
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <p class="mt-2">Need an account? <a href="{{ url_for('marketplace.register') }}">Register</a></p>
</div>
{% endblock %}
