{% extends "base.html" %}

{% block content %}
<section class="page-shell narrow-page">
    <div class="marketplace-wrapper form-wrapper">
        {% if item %}
            <div class="form-heading">
                <p class="eyebrow">Private Message</p>
                <h1>Message Seller</h1>
                <p>You are contacting <strong>{{ item.seller }}</strong> about <strong>{{ item.title }}</strong>.</p>
            </div>

            <form method="POST" class="listing-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>

                <label>Your Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Message</label>
                <textarea name="message" rows="5" placeholder="Hi, is this still available?" required></textarea>

                <div class="form-actions">
                    <a href="{{ url_for('marketplace') }}" class="secondary-btn">Back</a>
                    <button type="submit" class="publish-btn">Send Message</button>
                </div>
            </form>
        {% else %}
            <div class="empty-state"><h1>Item Not Found</h1><p>The selected listing could not be found.</p></div>
        {% endif %}
    </div>
</section>
{% endblock %}
