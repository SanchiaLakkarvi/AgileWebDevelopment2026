{% extends "base.html" %}

{% block content %}
<section class="page-shell narrow-page">
    <div class="marketplace-wrapper form-wrapper">
        <div class="form-heading">
            <p class="eyebrow">Create Listing</p>
            <h1>Post a New Listing</h1>
            <p>Your listing will be posted under <strong>{{ current_user }}</strong>. Uploading a photo is optional.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="listing-form">
            <label>Item Title</label>
            <input type="text" name="title" placeholder="Example: Scientific calculator" required>

            <label>Price</label>
            <input type="number" name="price" min="1" placeholder="Example: 25" required>

            <label>Upload Image</label>
            <input type="file" name="image" accept="image/*">
            <p class="help-text">Accepted: JPG, PNG, JPEG, GIF, WEBP. If no image is uploaded, a default image is used.</p>

            <label>Category</label>
            <select name="category" required>
                {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>

            <label>Description</label>
            <textarea name="description" rows="5" placeholder="Mention condition, pickup location, and any important details." required></textarea>

            <div class="form-actions">
                <a href="{{ url_for('marketplace') }}" class="secondary-btn">Cancel</a>
                <button type="submit" class="publish-btn">Add Listing</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
